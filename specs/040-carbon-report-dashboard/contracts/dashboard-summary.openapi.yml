openapi: 3.1.0
info:
  title: F21 — GET /api/dashboard/summary (extended)
  version: "1.0.0"
  description: |
    Endpoint existant étendu par F21. Le payload reçoit désormais
    `financing.applications_by_offer` (≤ 5 cards) et
    `financing.active_intermediaries` (avec coordonnées + fallback capitale UEMOA).
    Les scores ESG / carbone / crédit exposent un champ `sources` (F01).
paths:
  /api/dashboard/summary:
    get:
      summary: Tableau de bord PME consolidé
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Synthèse multi-modules pour le compte courant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401": { description: Non authentifié }
        "403": { description: Accès refusé (RLS multi-tenant) }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DashboardSummary:
      type: object
      required: [esg, carbon, credit, financing, next_actions, recent_activity, badges]
      properties:
        esg:
          $ref: "#/components/schemas/ScoreBlock"
        carbon:
          $ref: "#/components/schemas/ScoreBlock"
        credit:
          $ref: "#/components/schemas/ScoreBlock"
        financing:
          type: object
          required: [applications_by_offer, active_intermediaries, next_deadlines]
          properties:
            applications_by_offer:
              type: array
              maxItems: 5
              items:
                $ref: "#/components/schemas/ApplicationCard"
            active_intermediaries:
              type: array
              items:
                $ref: "#/components/schemas/ActiveIntermediary"
            next_deadlines:
              type: array
              items:
                type: object
                properties:
                  application_id: { type: string, format: uuid }
                  deadline: { type: string, format: date }
                  label: { type: string }
        next_actions:
          type: array
          items: { type: object }
        recent_activity:
          type: array
          maxItems: 5
          items:
            type: object
            properties:
              audit_id: { type: string, format: uuid }
              entity_type: { type: string }
              action: { type: string }
              created_at: { type: string, format: date-time }
              source_of_change: { type: string, enum: [manual, llm, admin, system, import] }
        badges:
          type: array
          items: { type: string }
    ScoreBlock:
      type: object
      properties:
        score: { type: number, nullable: true }
        rating: { type: string, nullable: true }
        sources:
          type: array
          items:
            $ref: "#/components/schemas/ScoreSourceRef"
    ScoreSourceRef:
      type: object
      required: [source_id, label, publisher]
      properties:
        source_id: { type: string, format: uuid }
        label: { type: string }
        publisher: { type: string }
        version: { type: string, nullable: true }
        url: { type: string, format: uri, nullable: true }
    ApplicationCard:
      type: object
      required: [application_id, fund_name, intermediary_name, status, current_step, last_activity_at]
      properties:
        application_id: { type: string, format: uuid }
        offer_id: { type: string, format: uuid, nullable: true }
        fund_name: { type: string }
        intermediary_name:
          type: string
          description: "« Accès direct » lorsque l'offre n'a pas d'intermédiaire."
        fund_logo_url: { type: string, format: uri, nullable: true }
        intermediary_logo_url: { type: string, format: uri, nullable: true }
        status:
          type: string
          enum: [draft, submitted_to_intermediary, submitted_to_fund, under_review, accepted, rejected, withdrawn, funded]
        current_step:
          type: string
          description: "Libellé d'étape français (ex: « Instruction par BOAD »)."
        next_deadline: { type: string, format: date, nullable: true }
        next_reminder: { type: string, nullable: true }
        last_activity_at: { type: string, format: date-time }
    ActiveIntermediary:
      type: object
      required: [intermediary_id, name, type, country, lat, lon, accreditations, applications_count]
      properties:
        intermediary_id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string, enum: [gov_agency, dfi, commercial_bank, mfi, ngo, consulting, other] }
        country: { type: string }
        lat: { type: number, format: float }
        lon: { type: number, format: float }
        is_fallback_capital: { type: boolean, default: false }
        accreditations:
          type: array
          items: { type: string }
        applications_count: { type: integer, minimum: 0 }
