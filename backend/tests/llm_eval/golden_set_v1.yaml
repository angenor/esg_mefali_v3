# Golden set v1 — Story 10.3 (epic M10)
#
# Repartition (cf. story 10.3 contexte §1, repartition CORRIGEE) :
#   ask_interactive_question / qcu                   : 5
#   ask_interactive_question / qcm                   : 2
#   ask_interactive_question / qcu_justification     : 1
#   update_company_profile                           : 6
#   create_fund_application                          : 3
#   batch_save_esg_criteria                          : 3
#   create_carbon_assessment (mutation carbone reelle): 2
#   trigger_guided_tour                              : 1
#   get_company_profile_chat / get_user_dashboard_summary (lecture) : 2
#   Cas piege (pas de tool, texte libre attendu)     : 5
#   ----------------------------------------------------------------
#   Total                                            : 30
#
# Verrous (rappel) :
#   - `ask_qcu` / `ask_qcm` / `show_*` n'existent PAS — verrou stories 10.1 + 10.2.
#   - Le champ s'appelle `current_page` (pas `page_context`).
#   - `current_page` = path Nuxt brut, normalise par `normalize_page` cote runner.
#   - `expected_tool: null` => texte libre attendu (cas piege).
#   - `expected_payload_partial` est valide en subset match (egalite des champs cites).
#   - Pour les tools dont l'argument requiert un UUID (assessment_id, fund_id,
#     application_id), `expected_payload_partial` reste vide ou minimal car le LLM
#     ne peut pas inventer un UUID valide pour la cible reelle. Le test
#     `payload_valide` (Pydantic strict) reste pertinent : il echouera si le LLM
#     fournit autre chose qu'un UUID-like — c'est volontaire et trace en baseline.

- id: case_001
  message: "Quel est le secteur de mon entreprise ?"
  current_page: "/profile"
  node_name: "chat"
  expected_tool: "ask_interactive_question"
  expected_payload_partial:
    question_type: "qcu"
  accepted_alternatives:
    - "get_company_profile"
    - "get_company_profile_chat"
  notes: "QCU classique : choix d'un secteur unique. Alt accepte : LLM peut prudemment lire le profil avant de poser la question (read-before-ask)."

